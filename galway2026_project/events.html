<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events - GAF 2026</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
<div class="logo">GAF 2026</div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="events.html" class="active">Events</a>
<a href="cart.html">Cart <span class="badge" id="cart-count">0</span></a>
<a href="support.html">Support</a>
<a href="profile.html">Profile</a>
</nav>
</header>

<section class="section">
<h2>Featured Events</h2>

<input type="radio" name="category" id="music" checked>
<input type="radio" name="category" id="theatre">
<input type="radio" name="category" id="dance">

<div class="sub-nav">
<label for="music">Music</label>
<label for="theatre">Theatre</label>

</div>

<!-- MUSIC -->
<div class="content music-content">
<div class="event-grid">

<div class="event-card">
<img src="images/music1.jpg">
<div class="event-content">
<h3>Opening Night Concert</h3>
<p>15 July 2026</p>
<a href="event-detail.html?id=opening-night" class="btn">View Details</a>
</div>
</div>

<div class="event-card">
<img src="images/music2.jpg">
<div class="event-content">
<h3>Jazz Evening</h3>
<p>16 July 2026</p>
<a href="event-detail.html?id=jazz-evening" class="btn">View Details</a>
</div>
</div>

</div>
</div>

<!-- THEATRE -->
<div class="content theatre-content">
<div class="event-grid">

<div class="event-card">
<img src="images/theatre1.jpg">
<div class="event-content">
<h3>Theatre Masterpiece</h3>
<p>18 July 2026</p>
<a href="event-detail.html?id=theatre-masterpiece" class="btn">View Details</a>
</div>
</div>

</div>
</div>

<!-- DANCE -->
<div class="content dance-content">
<div class="event-grid">

<div class="event-card">
<img src="images/dance1.jpg">
<div class="event-content">
<h3>Contemporary Dance</h3>
<p>20 July 2026</p>
<a href="event-detail.html?id=contemporary-dance" class="btn">View Details</a>
</div>
</div>

</div>
</div>

</section>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let count = cart.reduce((sum,item)=> sum + item.quantity ,0);
document.getElementById("cart-count").innerText = count;
</script>

</body>
</html>
